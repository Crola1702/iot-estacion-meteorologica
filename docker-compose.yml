services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: weather_timescaledb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-sensor_db}
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: weather_backend
    depends_on:
      - timescaledb
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@timescaledb:5432/sensor_db}
      DEFAULT_STATION_ID: ${DEFAULT_STATION_ID:-uniandes-meteo-01}
      DISPLAY_TIMEZONE: ${DISPLAY_TIMEZONE:-America/Bogota}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      WEATHERCLOUD_ENABLED: ${WEATHERCLOUD_ENABLED:-false}
      WEATHERCLOUD_ID: ${WEATHERCLOUD_ID:-}
      WEATHERCLOUD_KEY: ${WEATHERCLOUD_KEY:-}
      WEATHERCLOUD_SYNC_INTERVAL_MINUTES: ${WEATHERCLOUD_SYNC_INTERVAL_MINUTES:-5}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    container_name: weather_frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  timescale_data:
